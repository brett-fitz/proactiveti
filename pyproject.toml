[tool.poetry]
name = "proactiveti"
version = "0.1.0"
description = "Proactive Threat Intelligence."
authors = ["Brett Fitzpatrick"]
license = "MIT"
readme = "README.md"

[tool.poetry.dependencies]
python = "^3.9"
click = "^8.1.7"
coloredlogs = "^15.0.1"
censys = "^2.2.13"
shodan = "^1.31.0"
pyyaml = "^6.0.2"
aiofiles = "^23.2.1"
boto3 = "^1.34.157"
mypy-boto3-secretsmanager = "^1.34.145"
stix2 = "^3.0.1"
validators = "^0.33.0"
yamale = "^5.2.1"


[tool.poetry.group.dev.dependencies]
pylint = "^3.2.6"
ipython = "^8.26.0"
ipykernel = "^6.29.5"
pytest = "^8.3.2"


[tool.poetry.group.test.dependencies]
pytest = "^8.3.2"
pytest-cov = "^5.0.0"


[tool.poetry.group.docs.dependencies]
mkdocs = "^1.6.0"
mkdocstrings = "^0.25.2"
mkdocs-material = "^9.5.31"
mkdocs-minify-plugin = "^0.8.0"
mkdocs-table-reader-plugin = "^2.2.2"
mkdocs-include-markdown-plugin = "^6.2.1"

[tool.poetry.scripts]
proactiveti = "proactiveti.cli.cli:cli"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
